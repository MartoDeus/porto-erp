<svg width="1800" height="1040" viewBox="0 0 1800 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .node-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .node-text { font: 400 16px Arial, sans-serif; fill: #334155; }
      .small-text { font: 400 14px Arial, sans-serif; fill: #475569; }
      .footer-text { font: 700 16px Arial, sans-serif; fill: #0f766e; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f8f73"/>
    </marker>
  </defs>

  <rect width="1800" height="1040" fill="#f8fafc"/>

  <text x="900" y="60" text-anchor="middle" class="title">Flujo de Registro de Diésel</text>
  <text x="900" y="92" text-anchor="middle" class="subtitle">Proceso funcional del módulo de registro en el ERP</text>

  <g filter="url(#shadow)">
    <rect x="775" y="120" rx="18" ry="18" width="250" height="64" fill="#dff7ef" stroke="#34d399" stroke-width="2"/>
    <text x="900" y="160" text-anchor="middle" class="node-title">Inicio</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="150" y="240" rx="18" ry="18" width="280" height="84" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="290" y="278" text-anchor="middle" class="node-title">Seleccionar fecha</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="240" rx="18" ry="18" width="320" height="84" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="660" y="278" text-anchor="middle" class="node-title">Seleccionar nave/barcaza</text>
    <text x="660" y="302" text-anchor="middle" class="node-text">origen</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="890" y="240" rx="18" ry="18" width="230" height="84" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1005" y="290" text-anchor="middle" class="node-title">Seleccionar turno</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1190" y="240" rx="18" ry="18" width="420" height="84" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <text x="1400" y="278" text-anchor="middle" class="node-title">Consultar stock inicial previo</text>
    <text x="1400" y="302" text-anchor="middle" class="small-text">usa el último stock final registrado</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="390" rx="22" ry="22" width="940" height="190" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="900" y="430" text-anchor="middle" class="node-title">Completar módulos opcionales</text>

    <rect x="480" y="455" rx="14" ry="14" width="130" height="48" fill="#e6f9f2" stroke="#b7ead9"/>
    <text x="545" y="485" text-anchor="middle" class="node-text">Recarga</text>

    <rect x="630" y="455" rx="14" ry="14" width="130" height="48" fill="#e6f9f2" stroke="#b7ead9"/>
    <text x="695" y="485" text-anchor="middle" class="node-text">Consumo</text>

    <rect x="780" y="455" rx="14" ry="14" width="170" height="48" fill="#e6f9f2" stroke="#b7ead9"/>
    <text x="865" y="485" text-anchor="middle" class="node-text">Acta de Sondaje</text>

    <rect x="970" y="455" rx="14" ry="14" width="140" height="48" fill="#e6f9f2" stroke="#b7ead9"/>
    <text x="1040" y="485" text-anchor="middle" class="node-text">Despacho</text>

    <rect x="1130" y="455" rx="14" ry="14" width="150" height="48" fill="#e6f9f2" stroke="#b7ead9"/>
    <text x="1205" y="485" text-anchor="middle" class="node-text">Tripulación</text>

    <rect x="640" y="520" rx="14" ry="14" width="190" height="48" fill="#e6f9f2" stroke="#b7ead9"/>
    <text x="735" y="550" text-anchor="middle" class="node-text">Observaciones</text>

    <rect x="860" y="520" rx="14" ry="14" width="380" height="48" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1050" y="550" text-anchor="middle" class="small-text">Si usas despacho: destino, cantidad y N° vale</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="655" y="635" rx="18" ry="18" width="490" height="84" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="900" y="673" text-anchor="middle" class="node-title">Agregar filas de despacho / transferencia</text>
    <text x="900" y="697" text-anchor="middle" class="small-text">Nave/Barcaza recibe, cantidad, vale y tipo</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="900,765 1040,845 900,925 760,845" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="900" y="835" text-anchor="middle" class="node-title">¿Hay datos válidos</text>
    <text x="900" y="860" text-anchor="middle" class="node-title">para guardar?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="790" rx="18" ry="18" width="320" height="110" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
    <text x="1270" y="825" text-anchor="middle" class="node-title">Calcular resumen</text>
    <text x="1270" y="852" text-anchor="middle" class="small-text">Stock inicial, recarga, consumo,</text>
    <text x="1270" y="874" text-anchor="middle" class="small-text">transferencia, despacho, sondaje</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1480" y="805" rx="18" ry="18" width="220" height="64" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="1590" y="845" text-anchor="middle" class="node-title">Guardar registro</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1125" y="950" rx="18" ry="18" width="290" height="64" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1270" y="990" text-anchor="middle" class="node-title">Registrar en kardex</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1480" y="950" rx="18" ry="18" width="250" height="64" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1605" y="990" text-anchor="middle" class="node-title">Actualizar consulta</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="790" rx="18" ry="18" width="300" height="84" fill="#fff1f2" stroke="#fda4af" stroke-width="2"/>
    <text x="220" y="828" text-anchor="middle" class="node-title">Completar datos faltantes</text>
    <text x="220" y="852" text-anchor="middle" class="small-text">o activar un módulo válido</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1480" y="130" rx="18" ry="18" width="200" height="64" fill="#dff7ef" stroke="#34d399" stroke-width="2"/>
    <text x="1580" y="170" text-anchor="middle" class="node-title">Fin</text>
  </g>

  <path d="M900 184 V220" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M430 282 H500" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M820 282 H890" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1120 282 H1190" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1400 324 V366 H900 V390" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M900 580 V620" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M900 719 V755" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1040 845 H1100" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1430 845 H1470" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1590 869 V910 H1270 V950" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1415 982 H1470" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1605 950 V220 H1580 V194" stroke="#0f8f73" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M760 845 H520 V832 H370" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M220 790 V485 H430" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="640" y="825" class="small-text" fill="#ef4444">No</text>
  <text x="1070" y="828" class="small-text" fill="#0f8f73">Sí</text>

  <rect x="70" y="960" rx="16" ry="16" width="860" height="52" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="500" y="992" text-anchor="middle" class="footer-text">Nota: el stock inicial siempre toma el último stock final registrado de la nave/barcaza origen.</text>
</svg>
